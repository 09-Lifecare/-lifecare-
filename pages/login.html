<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LifeCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="logo">LifeCare</a>
        </div>
    </nav>

    <div class="auth-container">
        <div id="login-form">
            <h2>Login to LifeCare</h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <button onclick="login()">Login</button>
            </div>
            <div class="auth-toggle">
                Do not have an account? <a onclick="toggleAuth()">Sign Up</a>
            </div>
            <div class="info-box" style="margin-top: 2rem;">
                <h4>Demo Credentials</h4>
                <p>Email: sarah@lifecare.com</p>
                <p>Password: password123</p>
                <p>Role: Nursing Student</p>
            </div>
        </div>

        <div id="signup-form" class="hidden">
            <h2>Create Account</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="signup-role">
                    <option value="">Select your role</option>
                    <option value="Student">Student</option>
                    <option value="Nursing Student">Nursing Student</option>
                    <option value="Teacher">Teacher</option>
                </select>
            </div>
            <div class="form-group">
                <button onclick="signup()">Create Account</button>
            </div>
            <div class="auth-toggle">
                Already have an account? <a onclick="toggleAuth()">Login</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
